<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Modelagem teste</title>
</head>
<body>
    <main class="container">
        <h1>Teste de modelos 3D</h1>
        <section class="quadro">
           <model-viewer src="burgerturtlerigged.glb" auto-rotate camera-controls style="width: 1000px; height: 600px;" shadow-intensity="1" exposure="1"></model-viewer>
        </section>
        <section class="escolha">
            <div>
                <button class="modelbutton model1" onclick="clique(1)"><model-viewer src="burgerturtlerigged.glb" camera-orbit="225deg 90deg 90deg"></model-viewer></button>
            </div>
            <div>
                <button class="modelbutton model2" onclick="clique(2)"><model-viewer src="clippit.glb"></model-viewer></button>
            </div>
            <div>
                <button class="modelbutton model3" onclick="clique(3)"><model-viewer src="bart_simpson.glb"></model-viewer></button>
            </div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
